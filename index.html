<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    <link rel="manifest" href="manifest.json">
    <title>QRally Dictate Pro</title>
    <style>
        :root { 
            --rally-yellow: #ffd700; --rally-red: #ff3b30; --rally-bg: #121212; 
            --card-bg: #1e1e1e; --accent: var(--rally-yellow);
        }
        body.night-mode { --accent: var(--rally-red); }
        body.night-mode .note-item { border-left-color: var(--rally-red); }
        
        body { 
            background: var(--rally-bg); color: var(--accent); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; margin: 0;
            user-select: none; -webkit-user-select: none; overflow-x: hidden;
        }

        .voice-card { 
            background: var(--card-bg); border: 2px solid #333; border-radius: 24px; 
            padding: 25px; width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); box-sizing: border-box;
        }

        .ui-toggles { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; justify-content: center; }
        .toggle-btn { background: #333; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }

        #stage-name { 
            width: 100%; background: #000; color: var(--accent); border: 1px solid #444; 
            padding: 14px; border-radius: 12px; font-weight: bold; text-align: center;
            margin-bottom: 15px; box-sizing: border-box; font-size: 1.1rem; text-transform: uppercase;
        }

        #transcript-display { 
            background: #000; color: #fff; min-height: 110px; padding: 15px; 
            margin: 15px 0; border-radius: 12px; border: 1px solid #444; 
            font-style: italic; font-size: 1.2rem; text-align: center; line-height: 1.4;
            display: flex; align-items: center; justify-content: center; word-break: break-word;
        }

        .ptt-btn { 
            width: 160px; height: 160px; border-radius: 50%; border: 8px solid #333;
            background: #2a2a2a; color: white; font-weight: 900; font-size: 1.3rem;
            cursor: pointer; -webkit-tap-highlight-color: transparent; outline: none;
        }

        .ptt-btn.active { 
            background: var(--rally-red); border-color: #ff6b6b;
            animation: pulse-ring 1.2s infinite linear; transform: scale(0.95);
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 59, 48, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        /* High Visibility Overrides */
        body.high-viz .note-text { font-size: 2.3rem !important; font-weight: 900; line-height: 1.1; color: #fff; }
        body.high-viz .note-item { padding: 25px; border-left-width: 12px; }

        #history-list { width: 100%; max-width: 400px; margin-top: 20px; padding-bottom: 40px; }
        .note-item { 
            background: #222; margin-bottom: 12px; padding: 16px; border-radius: 12px; 
            border-left: 6px solid var(--accent); color: #eee;
            display: flex; flex-direction: column; gap: 12px;
        }

        .btn-group { display: flex; gap: 6px; justify-content: flex-end; }
        .play-btn { background: #007bff; color: white; padding: 10px 15px; font-size: 0.75rem; border-radius: 6px; }
        .share-btn { background: #25D366; color: white; padding: 10px 15px; font-size: 0.75rem; border-radius: 6px; }
        .del-btn { background: #4b1a1a; color: #ff6b6b; padding: 10px 15px; font-size: 0.75rem; border-radius: 6px; }
        
        .top-controls { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        .button-row { display: flex; gap: 8px; }
        .read-all-btn { background: #007bff; color: white; padding: 14px; border-radius: 25px; flex: 1; font-weight: bold; }
        .share-all-btn { background: #25D366; color: white; padding: 14px; border-radius: 25px; flex: 1; font-weight: bold; }
    </style>
</head>
<body>

    <div class="voice-card">
        <h2 style="letter-spacing: 3px; margin: 0 0 15px 0; color: white;">QRALLY <span style="color:var(--accent)">DICTATE</span></h2>
        
        <div class="ui-toggles">
            <button class="toggle-btn" onclick="document.body.classList.toggle('high-viz')">SIZE ±</button>
            <button class="toggle-btn" onclick="document.body.classList.toggle('night-mode')">NIGHT</button>
        </div>

        <input type="text" id="stage-name" placeholder="STAGE NAME" />
        <div id="transcript-display">READY</div>
        <button id="mic-btn" class="ptt-btn">HOLD</button>
    </div>

    <div class="top-controls" id="control-bar" style="display:none;">
        <div class="button-row">
            <button onclick="readAllNotes()" class="read-all-btn">LISTEN ALL</button>
            <button onclick="shareAllWhatsApp()" class="share-all-btn">SEND (WA)</button>
        </div>
        <button onclick="clearAll()" style="color:#666; background:none; text-decoration:underline; font-size:0.75rem; border:none; margin-top:10px;">ERASE ALL DATA</button>
    </div>

    <div id="history-list"></div>

    <script>
        const micBtn = document.getElementById('mic-btn');
        const display = document.getElementById('transcript-display');
        const historyList = document.getElementById('history-list');
        const stageInput = document.getElementById('stage-name');
        const controlBar = document.getElementById('control-bar');

        let isPressed = false;
        let savedNotes = JSON.parse(localStorage.getItem('qrally_dictate_notes')) || [];

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-GB';

        const speak = (text) => {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utterance);
        };

        const startAction = (e) => {
            if (e) e.preventDefault();
            if (isPressed) return;
            isPressed = true;
            micBtn.classList.add('active');
            display.innerText = "";
            try { 
                recognition.start(); 
                if (navigator.vibrate) navigator.vibrate(60); 
            } catch(err) {}
        };

        const stopAction = (e) => {
            if (e) e.preventDefault();
            if (!isPressed) return;
            isPressed = false;
            micBtn.classList.remove('active');
            recognition.stop();
        };

        micBtn.addEventListener('mousedown', startAction);
        window.addEventListener('mouseup', stopAction);
        micBtn.addEventListener('touchstart', startAction, {passive: false});
        micBtn.addEventListener('touchend', stopAction, {passive: false});

        recognition.onresult = (event) => {
            let final = '';
            let interim = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) final += event.results[i][0].transcript;
                else interim += event.results[i][0].transcript;
            }
            display.innerText = final + interim;
        };

        recognition.onend = () => {
            let result = display.innerText.trim();
            if (result && result !== "READY") {
                // RALLY TRANSLATOR (NOISE RESISTANT)
                result = result
                    .replace(/ titans/gi, ' >')
                    .replace(/ tightens/gi, ' >')
                    .replace(/(opens|open|hopes)/gi, ' <')
                    .replace(/^Write/i, 'Right')
                    .replace(/\bwrite\b/gi, 'right')
                    .replace(/\bL\b/gi, 'Left')
                    .replace(/\b(pressed|christ|rest)\b/gi, 'crest')
                    .replace(/\b(king|pink|think)\b/gi, 'kink')
                    .replace(/ into /gi, ' → ')
                    .replace(/ plus/gi, '+')
                    .replace(/ minus/gi, '-')
                    // Number cleanup for speed reading
                    .replace(/\bone\b/gi, '1').replace(/\btwo\b/gi, '2').replace(/\bthree\b/gi, '3')
                    .replace(/\bfour\b/gi, '4').replace(/\bfive\b/gi, '5').replace(/\bsix\b/gi, '6');

                savedNotes.push(result);
                localStorage.setItem('qrally_dictate_notes', JSON.stringify(savedNotes));
                render();
            }
            if (!isPressed) display.innerText = "READY";
        };

        window.deleteNote = (idx) => {
            const actualIndex = (savedNotes.length - 1) - idx;
            if (confirm("Delete?")) {
                savedNotes.splice(actualIndex, 1);
                localStorage.setItem('qrally_dictate_notes', JSON.stringify(savedNotes));
                render();
            }
        };

        window.clearAll = () => {
            if (confirm("Erase all data?")) {
                savedNotes = [];
                localStorage.removeItem('qrally_dictate_notes');
                render();
            }
        };

        window.shareWhatsApp = (t) => window.open(`https://wa.me/?text=${encodeURIComponent(t)}`, '_blank');

        window.shareAllWhatsApp = () => {
            const stage = stageInput.value || "STAGE";
            let msg = `*${stage.toUpperCase()} NOTES*\n\n`;
            savedNotes.forEach((n, i) => msg += `${i+1}. ${n}\n`);
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.readAllNotes = () => speak(savedNotes.join(". "));

        function render() {
            controlBar.style.display = savedNotes.length > 0 ? 'flex' : 'none';
            const displayNotes = [...savedNotes].reverse();
            historyList.innerHTML = displayNotes.map((n, i) => {
                const clean = n.replace(/'/g, "\\'");
                return `
                <div class="note-item">
                    <div class="note-text" style="font-weight: 600;">${n}</div>
                    <div class="btn-group">
                        <button class="play-btn" onclick="speak('${clean}')">PLAY</button>
                        <button class="share-btn" onclick="shareWhatsApp('${clean}')">WA</button>
                        <button class="del-btn" onclick="deleteNote(${i})">DEL</button>
                    </div>
                </div>`;
            }).join('');
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
        }
        render();
    </script>
</body>
</html>
